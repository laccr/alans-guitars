# Hand-curated seed list of US guitar retailers and well-known vintage / boutique specialists.
# Bootstraps the shop directory before any discovery (Reverb dir / NAMM / OSM / Google Places) runs.
#
# inventory_strategy values:
#   reverb_api          — primary listings live on Reverb (Tier A handles them)
#   dedicated_scraper   — has a custom scraper module under guitar_searcher.scrapers
#   shopify_json        — exposes /products.json (Tier B generic Shopify pull works)
#   generic_crawler     — needs Tier C Playwright + LLM extraction (Phase 2b)
#   email_only          — no parseable inventory; outreach only (Phase 3)
#   manual              — visit by hand
#   none                — placeholder
#
# Always store IANA timezone explicitly. Never infer from state.

shops:
  # ─── Major national retailers ──────────────────────────────────────────────
  - name: "Sweetwater"
    domain: sweetwater.com
    website_url: https://www.sweetwater.com
    classification: major_retailer
    inventory_strategy: dedicated_scraper
    scraper_module: sweetwater
    city: Fort Wayne
    state: IN
    timezone: America/Indiana/Indianapolis
    notes: Akamai/Cloudflare bot detection — uses Playwright + stealth.

  - name: "Guitar Center"
    domain: guitarcenter.com
    website_url: https://www.guitarcenter.com
    classification: major_retailer
    inventory_strategy: dedicated_scraper
